name: "Vote – Authentic Seller"
description: "Vote for a Whatnot fragrance seller you believe is authentic."
title: "[VOTE] <seller_username>"
labels:
  - "vote-authentic"

body:
  - type: "markdown"
    attributes:
      value: |
        Please enter the seller’s **exact Whatnot username**.
        Votes are public.

  - type: "input"
    id: "seller_username"
    attributes:
      label: "Whatnot seller username (exact)"
      placeholder: "e.g. fragranceking123"
    validations:
      required: true

  - type: "input"
    id: "seller_profile_link"
    attributes:
      label: "Seller profile link (optional)"
      placeholder: "https://www.whatnot.com/user/..."
    validations:
      required: false

  - type: "textarea"
    id: "why_authentic"
    attributes:
      label: "Why do you believe they’re authentic?"
      description: "Examples: sealed product, receipts shown on stream, consistent batches, reputation, etc."
      placeholder: "Explain briefly…"
    validations:
      required: true
