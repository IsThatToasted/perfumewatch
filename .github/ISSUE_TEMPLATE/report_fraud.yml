name: Report – Suspected Fraudulent Seller
description: Submit a report with evidence. You must include details + proof links/photos.
title: "SELLER NAME HERE (exact Whatnot seller name)"
labels: ["fraud-report"]
body:

  - type: input
    id: whatnotUser
    attributes:
      label: Your Whatnot Username
      placeholder: "yourusername"
    validations:
      required: true

  - type: input
    id: seller
    attributes:
      label: Reported seller Whatnot Username (exact)
      placeholder: "sellerusername"
    validations:
      required: true

  - type: input
    id: sellerLink
    attributes:
      label: Seller profile link (recommended)
      placeholder: "https://www.whatnot.com/user/..."
    validations:
      required: false

  - type: textarea
    id: complaint
    attributes:
      label: Complaint / what happened
      description: Include order date, item, what was wrong (counterfeit, missing, misrepresented, etc.)
      placeholder: "Write the details…"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Proof photos / evidence links
      description: Paste links to photos/videos (Imgur/Google Photos/etc). After submitting, you can also drag-drop images into issue comments.
      placeholder: "- Link 1\n- Link 2\n- Or use Attach Photos Below"
    validations:
      required: true

  - type: checkboxes
    id: consent
    attributes:
      label: Confirmation
      options:
        - label: "I confirm this report is truthful to the best of my knowledge."

          required: true
