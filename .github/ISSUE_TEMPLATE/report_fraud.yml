name: "Report – Suspected Fraudulent Seller"
description: "Submit a report with evidence. Must include proof."
title: "Fraud Report – <seller_username>"
labels:
  - "fraud-report"

body:
  - type: "markdown"
    attributes:
      value: |
        Submit a detailed fraud report.
        Evidence (photos, links, screenshots) is required.

  - type: "input"
    id: "reporter_whatnot_username"
    attributes:
      label: "Your Whatnot username"
      placeholder: "yourusername"
    validations:
      required: true

  - type: "input"
    id: "reported_seller_username"
    attributes:
      label: "Reported seller Whatnot username (exact)"
      placeholder: "sellerusername123"
    validations:
      required: true

  - type: "input"
    id: "seller_profile_link"
    attributes:
      label: "Seller profile link (recommended)"
      placeholder: "https://www.whatnot.com/user/..."
    validations:
      required: false

  - type: "textarea"
    id: "complaint_details"
    attributes:
      label: "Complaint / what happened"
      description: "Include order date, item purchased, what was wrong, etc."
      placeholder: "Explain what happened..."
    validations:
      required: true

  - type: "textarea"
    id: "evidence_links"
    attributes:
      label: "Proof photos / evidence links"
      description: "Upload images or paste links."
      placeholder: "Paste image or link here..."
    validations:
      required: true
